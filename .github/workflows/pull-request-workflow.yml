name: Pull Request Workflow
on: # yamllint disable-line rule:truthy
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  pr-checks:
    uses: diggsweden/reusable-ci/.github/workflows/pullrequest-orchestrator.yml@0d87fcd4cd9550e50bfa1923b98afbed80708325 # v2.7.9
    permissions:
      contents: read
      packages: read
      security-events: write
    secrets: inherit
    with:
      reusable-ci-ref: v2.7.9
      # This template is documentation/reference - not a buildable project
      # Projects using this template should set their actual type:
      # maven, npm, gradle, python, go, rust
      project-type: maven
      # Use just+mise-based linting (lightweight, uses .mise.toml + justfile)
      linters.devbasecheck: true
      # Disable deprecated linters (handled by justmiselint)
      linters.commitlint: false
      linters.licenselint: false
      linters.megalint: false
      # Other linters remain enabled by default
